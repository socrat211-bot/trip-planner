<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة دمج وتعديل الصور الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* تنسيق مساحات إعلانات Adsterra عشان متضربش */
        .ad-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px dashed rgba(148, 163, 184, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 12px;
            margin: 0 auto;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <header class="w-full py-6 px-4 text-center border-b border-slate-800 glass sticky top-0 z-50">
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-500 mb-2">
            <i class="fa-solid fa-images text-teal-400 ml-2"></i> منصة دمج وتعديل الصور الذكية
        </h1>
        <p class="text-sm md:text-base text-slate-400">ادمج صورك، عدل الأبعاد، واصنع تصميمك الخاص بسهولة مجاناً</p>
    </header>

    <div class="max-w-6xl mx-auto px-4 mt-6">
        <div class="ad-box w-full max-w-[728px] h-[90px] rounded-xl">
            <span><i class="fa-solid fa-rectangle-ad ml-1"></i> مساحة إعلانية (بانر علوي عريض 728x90)</span>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="glass p-6 rounded-2xl shadow-xl">
                <h2 class="text-xl font-bold text-teal-400 mb-6 flex items-center border-b border-slate-700 pb-3">
                    <i class="fa-solid fa-sliders ml-2"></i> أدوات التحكم
                </h2>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-2">الصورة الأولى الأساسية:</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer bg-slate-800/40 hover:bg-slate-800 transition">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <i class="fa-solid fa-cloud-arrow-up text-2xl text-teal-400 mb-2"></i>
                                <p class="text-xs text-slate-400">اضغط لرفع الصورة الأولى</p>
                            </div>
                            <input type="file" id="imgInput1" class="hidden" accept="image/*" />
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-300 mb-2">الصورة الثانية (الدمج):</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer bg-slate-800/40 hover:bg-slate-800 transition">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <i class="fa-solid fa-images text-2xl text-emerald-400 mb-2"></i>
                                <p class="text-xs text-slate-400">اضغط لرفع الصورة الثانية</p>
                            </div>
                            <input type="file" id="imgInput2" class="hidden" accept="image/*" />
                        </label>
                    </div>
                </div>

                <button id="combineBtn" class="w-full py-4 bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-400 hover:to-emerald-500 text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition flex items-center justify-center space-x-reverse space-x-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>ابدأ دمج ومعالجة الصور</span>
                </button>
            </div>

            <div class="ad-box w-[300px] h-[250px] rounded-2xl shadow-lg">
                <script>
                  atOptions = {
                    'key' : '1dbd6aa0d79aa551edf53ad17a91d272',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                  };
                </script>
                <script src="https://www.highperformanceformat.com/1dbd6aa0d79aa551edf53ad17a91d272/invoke.js"></script>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="glass p-6 rounded-2xl shadow-xl min-h-[400px] flex flex-col justify-between">
                <h3 class="text-lg font-bold text-slate-300 mb-4 border-b border-slate-700 pb-3">
                    <i class="fa-solid fa-eye text-teal-400 ml-2"></i> معاينة النتيجة النهائية
                </h3>

                <div class="flex-1 flex items-center justify-center bg-slate-900/60 rounded-xl p-4 min-h-[300px] border border-slate-800">
                    <canvas id="mainCanvas" class="max-w-full max-h-[450px] rounded shadow-md hidden"></canvas>
                    <div id="canvasPlaceholder" class="text-center text-slate-500 space-y-2">
                        <i class="fa-solid fa-photo-film text-4xl block animate-pulse"></i>
                        <p class="text-sm">قم برفع الصور واضغط "دمج" لتظهر النتيجة هنا فوراً</p>
                    </div>
                </div>

                <div id="downloadArea" class="hidden mt-6 pt-4 border-t border-slate-800 flex gap-4">
                    <button id="downloadBtn" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold transition flex items-center justify-center space-x-reverse space-x-2">
                        <i class="fa-solid fa-download"></i>
                        <span>تحميل الصورة النهائية</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const imgInput1 = document.getElementById('imgInput1');
        const imgInput2 = document.getElementById('imgInput2');
        const combineBtn = document.getElementById('combineBtn');
        const mainCanvas = document.getElementById('mainCanvas');
        const canvasPlaceholder = document.getElementById('canvasPlaceholder');
        const downloadArea = document.getElementById('downloadArea');
        const downloadBtn = document.getElementById('downloadBtn');
        const ctx = mainCanvas.getContext('2d');

        let img1 = null;
        let img2 = null;

        imgInput1.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                img1 = new Image();
                img1.src = URL.createObjectURL(file);
            }
        });

        imgInput2.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                img2 = new Image();
                img2.src = URL.createObjectURL(file);
            }
        });

        combineBtn.addEventListener('click', () => {
            if (!img1 || !img2) {
                alert('يا وحش لازم ترفع الصورتين الأول عشان ندمجهم!');
                return;
            }

            combineBtn.innerText = "جاري الدمج والمعالجة...";
            
            img1.onload = () => {
                img2.onload = () => {
                    mainCanvas.width = img1.width;
                    mainCanvas.height = img1.height;
                    ctx.drawImage(img1, 0, 0);
                    ctx.globalAlpha = 0.5;
                    ctx.drawImage(img2, 0, 0, img1.width, img1.height);
                    ctx.globalAlpha = 1.0;

                    canvasPlaceholder.classList.add('hidden');
                    mainCanvas.classList.remove('hidden');
                    downloadArea.classList.remove('hidden');
                    combineBtn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> <span>ابدأ دمج ومعالجة الصور</span>`;
                }
            }
            if (img1.complete && img2.complete) {
                img1.onload();
            }
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'combined-image.png';
            link.href = mainCanvas.toDataURL();
            link.click();
        });
    </script>

    <script src="https://pl30299634.effectivecpmnetwork.com/0c/fe/3b/0cfe3b942bfcaf8cc91d2bc6d85c6f03.js"></script>

    <script src="https://pl30299633.effectivecpmnetwork.com/0f/c5/24/0fc524475b4d4f02b3704a58efc600f9.js"></script>

</body>
</html>
